<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>구구단 쇼다운 - 2인용 마주보기 대결 웹앱</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 및 ReactDOM CDN (안정적인 v18 Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (JSX 코드를 브라우저에서 직접 빌드하기 위함) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 터치 오작동 방지 및 풀스크린 스타일 패치 -->
  <style>
    html, body {
      overscroll-behavior: none;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      background-color: #020617;
    }
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none; /* 브라우저의 기본 스크롤 및 더블탭 줌 전체 방지 */
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>

  <!-- Babel 컴파일 런타임 오류 방지 및 클래식 런타임 프리셋 강제 주입 -->
  <script>
    if (window.Babel) {
      Babel.registerPreset('classic-react', {
        presets: [
          [Babel.availablePresets['react'], { runtime: 'classic' }]
        ]
      });
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden">
  <div id="root" class="w-full h-full"></div>

  <!-- React & App 구현 스크립트 (커스텀 프리셋 적용) -->
  <script type="text/babel" data-presets="classic-react">
    const { useState, useEffect, useRef } = React;

    // --- 무에셋 고품질 아이콘 컴포넌트 정의 (Lucide SVG 인라인 대체) ---
    const Play = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/>
      </svg>
    );

    const RotateCcw = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <polyline points="3 3 3 8 8 8"/>
      </svg>
    );

    const Home = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    );

    const Volume2 = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    );

    const VolumeX = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="22" y1="9" x2="16" y2="15"/>
        <line x1="16" y1="9" x2="22" y2="15"/>
      </svg>
    );

    const Pause = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="14" y="4" width="4" height="16" rx="1"/>
        <rect x="6" y="4" width="4" height="16" rx="1"/>
      </svg>
    );

    const Award = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="8" r="6"/>
        <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
      </svg>
    );

    const Zap = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );

    const Flame = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
      </svg>
    );

    const Trophy = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
        <path d="M12 2a6 6 0 0 1 6 6v1a6 6 0 0 1-6 6 6 6 0 0 1-6-6V8a6 6 0 0 1 6-6z"/>
      </svg>
    );

    const Sparkles = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5 5 3Z"/>
        <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1 1-2.5Z"/>
      </svg>
    );

    // --- Web Audio API 사운드 효과 정의 ---
    const soundEffects = {
      ctx: null,
      enabled: true,
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },
      play(type) {
        if (!this.enabled) return;
        try {
          this.init();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);

          if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.linearRampToValueAtTime(90, now + 0.25);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
            osc.start(now);
            osc.stop(now + 0.25);
          } else if (type === 'steal') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900, now);
            osc.frequency.exponentialRampToValueAtTime(300, now + 0.35);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            osc.start(now);
            osc.stop(now + 0.35);
          } else if (type === 'combo') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, now);
            osc.frequency.setValueAtTime(1174.66, now + 0.08);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
          } else if (type === 'fanfare') {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, idx) => {
              const o = this.ctx.createOscillator();
              const g = this.ctx.createGain();
              o.connect(g);
              g.connect(this.ctx.destination);
              o.type = 'sine';
              o.frequency.setValueAtTime(freq, now + idx * 0.08);
              g.gain.setValueAtTime(0.08, now + idx * 0.08);
              g.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.4);
              o.start(now + idx * 0.08);
              o.stop(now + idx * 0.08 + 0.4);
            });
          }
        } catch (e) {
          console.warn("Sound play blocked or not supported:", e);
        }
      }
    };

    function App() {
      // --- 게임 환경 설정 상태 ---
      const [difficulty, setDifficulty] = useState('easy');
      const [gameMode, setGameMode] = useState('time');
      const [timeSetting, setTimeSetting] = useState(120);
      const [scoreGoal, setScoreGoal] = useState(20);
      const [soundOn, setSoundOn] = useState(true);

      // --- 스크린 상태 ---
      const [screen, setScreen] = useState('home');
      const [isPaused, setIsPaused] = useState(false);

      // --- 플레이어 실시간 게임 상태 ---
      const [p1, setP1] = useState(createInitialPlayerState());
      const [p2, setP2] = useState(createInitialPlayerState());
      const [timeLeft, setTimeLeft] = useState(120);

      // --- 타이머 참조 ---
      const timerRef = useRef(null);

      useEffect(() => {
        soundEffects.enabled = soundOn;
      }, [soundOn]);

      function createInitialPlayerState() {
        return {
          score: 0,
          streak: 0,
          maxStreak: 0,
          correctCount: 0,
          wrongCount: 0,
          currentQuestion: { a: 2, b: 3, answer: 6 },
          inputValue: '',
          feedbackMessage: '',
          feedbackType: '',
          isFlashing: false,
        };
      }

      const getDifficultyRange = (diff) => {
        if (diff === 'easy') return { min: 2, max: 9 };
        if (diff === 'mid') return { min: 2, max: 15 };
        return { min: 2, max: 19 };
      };

      const generateQuestion = (diff, currentQ) => {
        const range = getDifficultyRange(diff);
        let a, b, answer;
        
        do {
          a = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
          b = Math.floor(Math.random() * (range.max - 2 + 1)) + 2;
          answer = a * b;
        } while (currentQ && currentQ.a === a && currentQ.b === b);

        return { a, b, answer };
      };

      const handleStartGame = () => {
        soundEffects.init();
        const initialP1 = createInitialPlayerState();
        const initialP2 = createInitialPlayerState();
        
        initialP1.currentQuestion = generateQuestion(difficulty, null);
        initialP2.currentQuestion = generateQuestion(difficulty, null);

        setP1(initialP1);
        setP2(initialP2);
        setTimeLeft(timeSetting);
        setIsPaused(false);
        setScreen('play');

        if (gameMode === 'time') {
          startTimer();
        }
      };

      const startTimer = () => {
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              handleGameOver();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const stopTimer = () => {
        if (timerRef.current) clearInterval(timerRef.current);
      };

      const handleTogglePause = () => {
        if (isPaused) {
          setIsPaused(false);
          if (gameMode === 'time') startTimer();
        } else {
          setIsPaused(true);
          if (gameMode === 'time') stopTimer();
        }
      };

      const handleGameOver = () => {
        stopTimer();
        soundEffects.play('fanfare');
        setScreen('result');
      };

      const handleSubmitAnswer = (playerNum) => {
        if (isPaused) return;

        const isP1 = playerNum === 1;
        const player = isP1 ? p1 : p2;
        const opponent = isP1 ? p2 : p1;
        const setPlayer = isP1 ? setP1 : setP2;
        const setOpponent = isP1 ? setP2 : setP1;

        const userAns = parseInt(player.inputValue, 10);
        const correctAns = player.currentQuestion.answer;

        if (isNaN(userAns)) return;

        if (userAns === correctAns) {
          const nextStreak = player.streak + 1;
          const nextMaxStreak = Math.max(player.maxStreak, nextStreak);
          let scoreGain = 1;

          if (nextStreak >= 5) {
            scoreGain = 3;
          } else if (nextStreak >= 3) {
            scoreGain = 2;
          }

          let bonusMsg = `✅ 정답! (+${scoreGain}점)`;
          if (nextStreak === 3) {
            bonusMsg = `🔥 3연속 콤보 보너스! (+2점)`;
            soundEffects.play('combo');
          } else if (nextStreak >= 5) {
            bonusMsg = `⚡ 완벽한 질주! (+3점)`;
            soundEffects.play('combo');
          } else {
            soundEffects.play('correct');
          }

          let opponentScoreDeduction = 0;
          if (gameMode === 'score' && nextStreak >= 3 && opponent.score > 0) {
            opponentScoreDeduction = 1;
            bonusMsg += ` 🎯 상대 점수 -1 강탈!`;
            soundEffects.play('steal');
            
            setOpponent(prev => ({
              ...prev,
              score: Math.max(0, prev.score - 1),
              feedbackMessage: `💥 점수를 빼앗겼습니다!`,
              feedbackType: 'steal',
              isFlashing: true
            }));

            setTimeout(() => {
              setOpponent(prev => ({ ...prev, isFlashing: false }));
            }, 500);
          }

          setPlayer(prev => {
            const updatedScore = prev.score + scoreGain;
            
            if (gameMode === 'score' && updatedScore >= scoreGoal) {
              setTimeout(() => {
                handleGameOver();
              }, 400);
            }

            return {
              ...prev,
              score: updatedScore,
              streak: nextStreak,
              maxStreak: nextMaxStreak,
              correctCount: prev.correctCount + 1,
              currentQuestion: generateQuestion(difficulty, prev.currentQuestion),
              inputValue: '',
              feedbackMessage: bonusMsg,
              feedbackType: 'correct'
            };
          });

        } else {
          soundEffects.play('wrong');
          
          setPlayer(prev => {
            const penaltyScore = gameMode === 'score' ? Math.max(0, prev.score - 1) : prev.score;
            return {
              ...prev,
              score: penaltyScore,
              streak: 0,
              wrongCount: prev.wrongCount + 1,
              inputValue: '',
              feedbackMessage: `❌ 오답! (정답: ${correctAns})${gameMode === 'score' ? ' -1점 감점' : ''}`,
              feedbackType: 'wrong'
            };
          });
        }

        setTimeout(() => {
          setPlayer(prev => ({ ...prev, feedbackMessage: '', feedbackType: '' }));
        }, 1500);
      };

      const handleKeypadPress = (playerNum, char) => {
        const setPlayer = playerNum === 1 ? setP1 : setP2;

        setPlayer(prev => {
          let currentVal = prev.inputValue;
          if (char === 'C') {
            currentVal = '';
          } else if (char === 'ENTER') {
            return prev;
          } else {
            if (currentVal.length < 3) {
              currentVal += char;
            }
          }
          return { ...prev, inputValue: currentVal };
        });

        if (char === 'ENTER') {
          handleSubmitAnswer(playerNum);
        }
      };

      // --- 지연 없는 멀티터치 방지 전용 통합 포인터 다운 트리거 ---
      const triggerInput = (playerNum, char, e) => {
        if (e && e.cancelable) {
          e.preventDefault(); // 스크롤 및 브라우저 기본 반응 차단
        }
        handleKeypadPress(playerNum, char);
      };

      const handleGoHome = () => {
        stopTimer();
        setScreen('home');
      };

      const handleRematch = () => {
        handleStartGame();
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      };

      return (
        <div className="w-full h-full min-h-[100dvh] max-h-[100dvh] bg-slate-950 text-slate-100 flex flex-col justify-between overflow-hidden select-none font-sans relative">
          
          {/* 1. 홈 화면 (설정 스크린) */}
          {screen === 'home' && (
            <div className="flex-1 flex flex-col items-center justify-center p-4 md:p-8 overflow-y-auto max-w-4xl mx-auto w-full">
              <div className="text-center mb-6 md:mb-10">
                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-950/80 border border-indigo-500/30 text-indigo-400 text-xs font-bold tracking-wider uppercase mb-3 animate-pulse">
                  <Sparkles className="w-3.5 h-3.5" /> 2인용 마주보기 태블릿 전용 배틀
                </div>
                <h1 className="text-3xl md:text-6xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-rose-400 bg-clip-text text-transparent drop-shadow-sm">
                  구구단 쇼다운
                </h1>
                <p className="text-slate-400 mt-2 text-xs md:text-base">
                  태블릿을 테이블 중앙에 놓고 양쪽에서 서로 마주 보며 곱셈 실력을 겨루세요!
                </p>
              </div>

              <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-4 md:grid-cols-2 md:gap-8 mb-6 md:mb-10">
                <div className="bg-slate-900/60 border border-slate-800 rounded-3xl p-4 md:p-6 flex flex-col justify-between">
                  <div>
                    <h3 className="text-sm md:text-lg font-bold text-slate-300 mb-3 md:mb-4 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-blue-500"></span> 난이도 선택
                    </h3>
                    <div className="grid grid-cols-3 gap-2 md:gap-3">
                      {[
                        { id: 'easy', label: '초급 🌱', range: '2 ~ 9단' },
                        { id: 'mid', label: '중급 🔥', range: '2 ~ 15단' },
                        { id: 'hard', label: '고급 💎', range: '2 ~ 19단' },
                      ].map((item) => (
                        <button
                          key={item.id}
                          onClick={() => setDifficulty(item.id)}
                          className={`flex flex-col items-center justify-center p-2.5 md:p-4 rounded-xl md:rounded-2xl border-2 transition-all ${
                            difficulty === item.id
                              ? 'border-indigo-500 bg-indigo-950/40 text-indigo-200 font-bold scale-[1.02] shadow-lg shadow-indigo-950/50'
                              : 'border-slate-800 bg-slate-900 text-slate-400'
                          }`}
                        >
                          <span className="text-xs md:text-base font-semibold">{item.label}</span>
                          <span className="text-[10px] md:text-xs text-slate-500 mt-1">{item.range}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                  <p className="text-[10px] md:text-xs text-slate-500 mt-3 md:mt-4 leading-relaxed">
                    * 초급은 기본 9단까지, 중급은 15단, 고급은 격렬한 19단 연산까지 출제됩니다.
                  </p>
                </div>

                <div className="bg-slate-900/60 border border-slate-800 rounded-3xl p-4 md:p-6 flex flex-col justify-between">
                  <div>
                    <h3 className="text-sm md:text-lg font-bold text-slate-300 mb-3 md:mb-4 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-rose-500"></span> 대결 방식 설정
                    </h3>
                    
                    <div className="grid grid-cols-2 gap-2 md:gap-3 mb-4 md:mb-5">
                      <button
                        onClick={() => setGameMode('time')}
                        className={`py-2 md:py-3 rounded-xl border font-bold text-xs md:text-sm transition-all flex items-center justify-center gap-2 ${
                          gameMode === 'time'
                            ? 'border-indigo-500 bg-indigo-950/40 text-indigo-300'
                            : 'border-slate-800 bg-slate-900 text-slate-400'
                        }`}
                      >
                        <Zap className="w-3.5 h-3.5 md:w-4 md:h-4" /> 시간제 배틀
                      </button>
                      <button
                        onClick={() => setGameMode('score')}
                        className={`py-2 md:py-3 rounded-xl border font-bold text-xs md:text-sm transition-all flex items-center justify-center gap-2 ${
                          gameMode === 'score'
                            ? 'border-indigo-500 bg-indigo-950/40 text-indigo-300'
                            : 'border-slate-800 bg-slate-900 text-slate-400'
                        }`}
                      >
                        <Trophy className="w-3.5 h-3.5 md:w-4 md:h-4" /> 점수제 배틀
                      </button>
                    </div>

                    {gameMode === 'time' ? (
                      <div>
                        <label className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider block mb-1.5">대결 제한 시간 설정</label>
                        <div className="grid grid-cols-4 gap-1.5">
                          {[60, 120, 180, 300].map((sec) => (
                            <button
                              key={sec}
                              onClick={() => setTimeSetting(sec)}

                  <Home className="w-4 h-4" /> 메인 화면으로
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
